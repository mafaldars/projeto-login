<!DOCTYPE html>
<html lang="en-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="media-query.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
        
            </div>

            <div id="formulario">
                <h1>login</h1>
                <p>Seja bem-vindo(a) novamente. Efectue login para aceder à sua conta.
                </p>
                <form action="login.php" method="post" autocomplete="on">
                    <div class="campo">
                        <i class="material-icons">person</i>
                        <input type="email" name="login" id="ilogin" placeholder="Digite o e-mail" autocomplete="email" required maxlength="30">
                        <label for="ilogin">Login</label>
                    </div>
                    <div class="campo">
                        <i class="material-icons">vpn_key</i>
                        <input type="password" name="password" id="ipassword" placeholder="Digite a password" autocomplete="current-password" required minlength="10">
                        <label for="ipassword">Password</label>
                    </div>
                    <input type="submit" value="Entrar">
                    <a href="esqueci.html">Recuperar a password <i class="material-icons">email</i>

                    </a>

                </form>
            </div>
        </section>
    </main>
    
</body>
</html>
